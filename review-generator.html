<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generate Your Review - AAS Hospital</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --green:#1B4D3E;
    --light-blue:#A7D8F0;
    --red:#E63946;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#f7fafc;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 8px 25px rgba(0,0,0,.08);
}

h1{
    color:var(--green);
    text-align:center;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:30px;
}

.options{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

.option{
    border:1px solid #ddd;
    border-radius:12px;
    padding:15px;
}

.option input{
    margin-right:10px;
}

.generate-btn{
    width:100%;
    margin-top:25px;
    background:var(--green);
    color:white;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
}

.review-box{
    margin-top:25px;
    display:none;
}

textarea{
    width:100%;
    min-height:220px;
    padding:15px;
    border-radius:12px;
    border:1px solid #ddd;
    font-family:inherit;
    font-size:15px;
}

.submit-btn{
    width:100%;
    margin-top:15px;
    background:var(--red);
    color:white;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
}

.submit-btn:hover{
    opacity:.9;
}

@media(max-width:700px){

.options{
    grid-template-columns:1fr;
}

}

</style>
</head>
<body>

<div class="container">

<div class="card">

<h1>Thank You For Your 5-Star Rating ⭐⭐⭐⭐⭐</h1>

<p class="subtitle">
What did you like most about AAS Hospital?
</p>

<div class="options">

<label class="option">
<input type="checkbox" value="Best Doctor in Wardha">
Best Doctor in Wardha
</label>

<label class="option">
<input type="checkbox" value="Best Surgeon in Wardha">
Best Surgeon in Wardha
</label>

<label class="option">
<input type="checkbox" value="Best Pathology Lab in Wardha">
Best Pathology Lab in Wardha
</label>

<label class="option">
<input type="checkbox" value="Excellent Staff">
Excellent Staff
</label>

<label class="option">
<input type="checkbox" value="Fast Reports">
Fast Reports
</label>

<label class="option">
<input type="checkbox" value="Clean Hospital">
Clean Hospital
</label>

<label class="option">
<input type="checkbox" value="Emergency Care">
Emergency Care
</label>

<label class="option">
<input type="checkbox" value="Affordable Treatment">
Affordable Treatment
</label>

<label class="option">
<input type="checkbox" value="Friendly Doctors">
Friendly Doctors
</label>

<label class="option">
<input type="checkbox" value="Modern Facilities">
Modern Facilities
</label>

<label class="option">
<input type="checkbox" value="Accurate Diagnosis">
Accurate Diagnosis
</label>

<label class="option">
<input type="checkbox" value="Patient-Centered Care">
Patient-Centered Care
</label>

</div>

<button class="generate-btn" onclick="generateReview()">
Generate My Review
</button>

<div class="review-box" id="reviewBox">

<textarea id="reviewText"></textarea>

<button
class="submit-btn"
onclick="submitGoogleReview()">

Submit Google Review

</button>

</div>

</div>

</div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbw-pCWG_45x8cWkx8oozGAeazeR7XUrsbS3KBF6SH5gDqxovxMiSpSa5wuFrv0-ZQ4e/exec";

let selectedOptions = [];

function generateReview(){

    selectedOptions = [];

    document
    .querySelectorAll('input[type="checkbox"]:checked')
    .forEach(item=>{
        selectedOptions.push(item.value);
    });

    if(selectedOptions.length === 0){

        alert("Please select at least one option.");

        return;
    }

    let review = "";

    const hasDoctor =
    selectedOptions.includes("Best Doctor in Wardha");

    const hasSurgeon =
    selectedOptions.includes("Best Surgeon in Wardha");

    const hasPathology =
    selectedOptions.includes("Best Pathology Lab in Wardha");

    const hasStaff =
    selectedOptions.includes("Excellent Staff");

    const hasReports =
    selectedOptions.includes("Fast Reports");

    const hasClean =
    selectedOptions.includes("Clean Hospital");

    const hasEmergency =
    selectedOptions.includes("Emergency Care");

    const hasAffordable =
    selectedOptions.includes("Affordable Treatment");

    const hasFriendly =
    selectedOptions.includes("Friendly Doctors");

    const hasModern =
    selectedOptions.includes("Modern Facilities");

    const hasDiagnosis =
    selectedOptions.includes("Accurate Diagnosis");

    const hasPatientCare =
    selectedOptions.includes("Patient-Centered Care");

    review =
    "I had an excellent experience at AAS Hospital & Pathology. ";

    if(hasDoctor || hasFriendly){

        review +=
        "The doctors were highly knowledgeable, approachable and took the time to explain everything clearly. ";
    }

    if(hasSurgeon){

        review +=
        "The surgical team was professional, skilled and gave me complete confidence throughout my treatment. ";
    }

    if(hasPathology || hasReports || hasDiagnosis){

        review +=
        "The pathology services were accurate, reliable and reports were delivered promptly. ";
    }

    if(hasStaff){

        review +=
        "The staff was courteous, supportive and always willing to help. ";
    }

    if(hasClean){

        review +=
        "The hospital maintained excellent cleanliness and hygiene standards. ";
    }

    if(hasModern){

        review +=
        "The facilities were modern, well-equipped and patient friendly. ";
    }

    if(hasEmergency){

        review +=
        "Emergency services were prompt and efficiently managed. ";
    }

    if(hasAffordable){

        review +=
        "The treatment was affordable while maintaining a high standard of care. ";
    }

    if(hasPatientCare){

        review +=
        "I truly appreciated the patient-centered approach and personal attention provided by the medical team. ";
    }

    review +=
    "I would highly recommend AAS Hospital & Pathology to anyone looking for quality healthcare services in Wardha.";

    document.getElementById("reviewText").value = review;

    document.getElementById("reviewBox").style.display = "block";
}

async function submitGoogleReview(){

    const review =
    document.getElementById("reviewText").value;

    try{

        await fetch(SCRIPT_URL,{
            method:"POST",
            body:JSON.stringify({
                rating:"5",
                selectedOptions:selectedOptions.join(", "),
                generatedReview:review
            })
        });

    }catch(err){
        console.log(err);
    }

    try{

        await navigator.clipboard.writeText(review);

        alert(
        "Review copied to clipboard. Paste it on the Google review page."
        );

    }catch(err){
        console.log(err);
    }

    window.open(
    "https://g.page/r/CZfxbPXREOsgEBM/review",
    "_blank");

}

</script>

</body>
</html>
