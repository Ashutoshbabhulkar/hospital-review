<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generate Your Review - AAS Hospital</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --green:#1B4D3E;
    --red:#E63946;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#f7fafc;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 8px 25px rgba(0,0,0,.08);
}

h1{
    color:var(--green);
    text-align:center;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:30px;
}

.options{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

.option{
    border:1px solid #ddd;
    border-radius:12px;
    padding:15px;
}

.generate-btn{
    width:100%;
    margin-top:25px;
    background:var(--green);
    color:white;
    border:none;
    padding:15px;
    border-radius:12px;
    cursor:pointer;
}

.review-box{
    display:none;
    margin-top:25px;
}

textarea{
    width:100%;
    min-height:220px;
    padding:15px;
    border:1px solid #ddd;
    border-radius:12px;
    font-family:inherit;
}

.submit-btn{
    width:100%;
    margin-top:15px;
    background:var(--red);
    color:white;
    border:none;
    padding:15px;
    border-radius:12px;
    cursor:pointer;
}

.copy-message{
    display:none;
    text-align:center;
    margin-top:15px;
    color:var(--green);
    font-weight:600;
}

@media(max-width:700px){

.options{
    grid-template-columns:1fr;
}

}

</style>
</head>
<body>

<div class="container">

<div class="card">

<h1>Thank You For Your 5-Star Rating ⭐⭐⭐⭐⭐</h1>

<p class="subtitle">
What did you like most about AAS Hospital?
</p>

<div class="options">

<label class="option"><input type="checkbox" value="Best Doctor in Wardha"> Best Doctor in Wardha</label>
<label class="option"><input type="checkbox" value="Best Surgeon in Wardha"> Best Surgeon in Wardha</label>
<label class="option"><input type="checkbox" value="Best Pathology Lab in Wardha"> Best Pathology Lab in Wardha</label>
<label class="option"><input type="checkbox" value="Excellent Staff"> Excellent Staff</label>
<label class="option"><input type="checkbox" value="Fast Reports"> Fast Reports</label>
<label class="option"><input type="checkbox" value="Clean Hospital"> Clean Hospital</label>
<label class="option"><input type="checkbox" value="Emergency Care"> Emergency Care</label>
<label class="option"><input type="checkbox" value="Affordable Treatment"> Affordable Treatment</label>
<label class="option"><input type="checkbox" value="Friendly Doctors"> Friendly Doctors</label>
<label class="option"><input type="checkbox" value="Modern Facilities"> Modern Facilities</label>
<label class="option"><input type="checkbox" value="Accurate Diagnosis"> Accurate Diagnosis</label>
<label class="option"><input type="checkbox" value="Patient-Centered Care"> Patient-Centered Care</label>

</div>

<button class="generate-btn" onclick="generateReview()">
Generate My Review
</button>

<div class="review-box" id="reviewBox">

<textarea id="reviewText"></textarea>

<button
class="submit-btn"
onclick="submitGoogleReview()">
Submit Google Review
</button>

<p id="copyMessage" class="copy-message">
Opening Google Review page...
</p>

</div>

</div>

</div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbw-pCWG_45x8cWkx8oozGAeazeR7XUrsbS3KBF6SH5gDqxovxMiSpSa5wuFrv0-ZQ4e/exec";

let selectedOptions = [];

function generateReview(){

    selectedOptions = [];

    document.querySelectorAll(
    'input[type="checkbox"]:checked'
    ).forEach(item=>{
        selectedOptions.push(item.value);
    });

    if(selectedOptions.length < 2){

        alert("Please select at least 2 options.");

        return;
    }

    let review =
    "I had an excellent experience at AAS Hospital & Pathology. ";

    if(selectedOptions.includes("Best Doctor in Wardha") ||
       selectedOptions.includes("Friendly Doctors")){

        review +=
        "The doctors were knowledgeable, caring and took the time to explain everything clearly. ";
    }

    if(selectedOptions.includes("Best Surgeon in Wardha")){

        review +=
        "The surgical team was highly skilled, professional and reassuring throughout the treatment process. ";
    }

    if(selectedOptions.includes("Best Pathology Lab in Wardha") ||
       selectedOptions.includes("Fast Reports") ||
       selectedOptions.includes("Accurate Diagnosis")){

        review +=
        "The pathology services were accurate, reliable and reports were delivered promptly. ";
    }

    if(selectedOptions.includes("Excellent Staff")){

        review +=
        "The staff was courteous, supportive and always willing to help. ";
    }

    if(selectedOptions.includes("Clean Hospital")){

        review +=
        "The hospital maintained excellent cleanliness and hygiene standards. ";
    }

    if(selectedOptions.includes("Modern Facilities")){

        review +=
        "The facilities were modern, comfortable and well-equipped. ";
    }

    if(selectedOptions.includes("Emergency Care")){

        review +=
        "Emergency services were prompt and efficiently managed. ";
    }

    if(selectedOptions.includes("Affordable Treatment")){

        review +=
        "The treatment was affordable without compromising quality. ";
    }

    if(selectedOptions.includes("Patient-Centered Care")){

        review +=
        "I appreciated the patient-centered approach and personal attention provided by the team. ";
    }

    review +=
    "I would highly recommend AAS Hospital & Pathology to anyone looking for quality healthcare services in Wardha.";

    document.getElementById("reviewText").value = review;

    document.getElementById("reviewBox").style.display = "block";
}

async function submitGoogleReview(){

    const review =
    document.getElementById("reviewText").value;

    await fetch(SCRIPT_URL,{
        method:"POST",
        body:JSON.stringify({
            rating:"5",
            selectedOptions:selectedOptions.join(", "),
            generatedReview:review
        })
    });

    await navigator.clipboard.writeText(review);

    document.getElementById("copyMessage")
    .style.display="block";

    setTimeout(function(){

        window.open(
        "https://g.page/r/CZfxbPXREOsgEBM/review",
        "_blank");

    },1000);
}

</script>

</body>
</html>
