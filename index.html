<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Hospital Feedback</title>

<style>

body{
font-family: Arial, sans-serif;
max-width:600px;
margin:auto;
padding:20px;
text-align:center;
}

h1{
margin-top:30px;
}

.star-btn{
display:block;
width:100%;
padding:15px;
margin:10px 0;
font-size:24px;
cursor:pointer;
}

.option{
display:block;
margin:10px;
font-size:18px;
}

button{
padding:15px 20px;
font-size:18px;
cursor:pointer;
margin-top:20px;
}

textarea{
width:100%;
height:150px;
margin-top:20px;
font-size:16px;
}

#positive,
#negative{
display:none;
}

</style>

</head>

<body>

<h1>How was your experience today?</h1>

<div id="ratingSection">

<button class="star-btn" onclick="selectRating(5)">
⭐⭐⭐⭐⭐ Excellent
</button>

<button class="star-btn" onclick="selectRating(4)">
⭐⭐⭐⭐ Good
</button>

<button class="star-btn" onclick="selectRating(3)">
⭐⭐⭐ Average
</button>

<button class="star-btn" onclick="selectRating(2)">
⭐⭐ Poor
</button>

<button class="star-btn" onclick="selectRating(1)">
⭐ Very Poor
</button>

</div>

<div id="positive">

<h2>What impressed you most?</h2>

<label class="option">
<input type="checkbox" value="doctors">
Excellent Doctors
</label>

<label class="option">
<input type="checkbox" value="staff">
Caring Staff
</label>

<label class="option">
<input type="checkbox" value="cleanliness">
Clean Facilities
</label>

<label class="option">
<input type="checkbox" value="service">
Fast Service
</label>

<button onclick="generateReview()">
Generate Review
</button>

<div id="reviewBox" style="display:none;">

<textarea id="reviewText"></textarea>

<br>

<button onclick="copyAndOpenGoogle()">
Copy Review & Open Google
</button>

</div>

</div>

<div id="negative">

<h2>We're sorry.</h2>

<p>Please tell us how we can improve.</p>

<textarea id="negativeFeedback"></textarea>

<br>

<button onclick="thankYou()">
Submit Feedback
</button>

</div>

<script>

let selectedRating = 0;

function selectRating(rating){

selectedRating = rating;

document.getElementById('ratingSection').style.display='none';

if(rating >= 4){
document.getElementById('positive').style.display='block';
}
else{
document.getElementById('negative').style.display='block';
}

}

function generateReview(){

let selected = [];

document.querySelectorAll('input[type=checkbox]:checked')
.forEach(item=>{
selected.push(item.parentElement.innerText.trim());
});

let review =
"Excellent experience at the hospital. " +
selected.join(", ") +
". The team was professional, caring and supportive throughout the visit.";

document.getElementById('reviewText').value = review;

document.getElementById('reviewBox').style.display='block';

}

function copyAndOpenGoogle(){

let text =
document.getElementById('reviewText').value;

navigator.clipboard.writeText(text);

window.open(
"https://g.page/r/CZfxbPXREOsgEBM/review",
"_blank"
);

alert(
"Review copied. Please paste it into Google Reviews."
);

}

function thankYou(){

alert(
"Thank you for your feedback."
);

}

</script>

</body>
</html>
